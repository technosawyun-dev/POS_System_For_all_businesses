version: "3.9"

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: pos_postgres
    restart: unless-stopped
    # Fix 1: raise max_connections — 4 workers×15 pool + 20 Celery + 10 admin ≈ 90, headroom to 200
    command: postgres -c max_connections=200
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 1g

  # Redis
  redis:
    image: redis:7-alpine
    container_name: pos_redis
    restart: unless-stopped
    # Fix 2: raised from 256mb to 1gb; 1300m container limit covers 1gb data + process overhead
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 1300m

  # FastAPI Application
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: pos_api
    restart: unless-stopped
    user: "1000:1000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 512m

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: pos_celery_worker
    restart: unless-stopped
    user: "1000:1000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    # Fix 4: raised from 4 to 20 so background tasks don't queue under load
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=20 -Q default
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q celery"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 512m

  # Celery Beat
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: pos_celery_beat
    restart: unless-stopped
    user: "1000:1000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A app.tasks.celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping 2>/dev/null | grep -q OK || pgrep -f 'celery.*beat'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 128m

  # Nginx
  nginx:
    image: nginx:1.25-alpine
    container_name: pos_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    networks:
      - pos_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  pos_network:
    driver: bridge
