version: "3.9"

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: pos_postgres
    restart: unless-stopped
    # Fix 1: raise max_connections — 4 workers×15 pool + 20 Celery + 10 admin ≈ 90, headroom to 200
    command: postgres -c max_connections=200
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 1g

  # Redis
  redis:
    image: redis:7-alpine
    container_name: pos_redis
    restart: unless-stopped
    # Fix 2: raised from 256mb to 1gb; 1300m container limit covers 1gb data + process overhead
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 1300m

  # FastAPI Application
  posapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: pos_api
    restart: unless-stopped
    # 4 uvicorn workers OOM'd the old 512m limit on this shared VPS; raised the
    # memory limit below to 1g to fit 4 workers instead of rolling back to 2
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 1g

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: pos_celery_worker
    restart: unless-stopped
    env_file: ./backend/.env
    # Concurrency 20 OOM'd the shared VPS's memory limit; 4 fits comfortably
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q default
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q celery"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 512m

  # Celery Beat
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: pos_celery_beat
    restart: unless-stopped
    env_file: ./backend/.env
    command: celery -A app.tasks.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping 2>/dev/null | grep -q OK || pgrep -f 'celery.*beat'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 128m

  # Postgres backup — local-only for now (hourly dumps, kept 7 days / 4 weeks /
  # 6 months). No offsite (R2) upload yet: the account's existing R2 token is
  # scoped to specific pre-created buckets and can't create a new one, so
  # offsite sync is deferred until a pos-specific bucket/token exists.
  db-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: pos_db_backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - SCHEDULE=@hourly
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=3
      - HEALTHCHECK_PORT=8080
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 128m

  # Offsite backup — rclone syncs ./backups to the Shared VPS over SFTP
  # (hhn.infinity.appboxes.co), hourly. Same pattern as the R2 uploaders on
  # the other apps on this VPS, just pointed at an SFTP remote instead of R2
  # since the Shared VPS isn't S3-compatible storage. The SSH key is
  # deliberately outside the repo (./backup-ssh-key/, generated directly on
  # the VPS) and restricted server-side to SFTP-only, no shell access.
  backup-offsite:
    image: rclone/rclone:latest
    container_name: pos_backup_offsite
    restart: unless-stopped
    volumes:
      - ./backups:/backups:ro
      - ./scripts/rclone-sync-sharedvps.sh:/rclone-sync.sh:ro
      - ./backup-ssh-key/id_sharedvps:/keys/id_sharedvps:ro
      - ./logs:/logs
    depends_on:
      - db-backup
    environment:
      - RCLONE_CONFIG_SHAREDVPS_TYPE=sftp
      - RCLONE_CONFIG_SHAREDVPS_HOST=hhn.infinity.appboxes.co
      - RCLONE_CONFIG_SHAREDVPS_PORT=10026
      - RCLONE_CONFIG_SHAREDVPS_USER=appbox
      - RCLONE_CONFIG_SHAREDVPS_KEY_FILE=/keys/id_sharedvps
      - RCLONE_CONFIG_SHAREDVPS_SHELL_TYPE=none
    entrypoint: ["/bin/sh", "/rclone-sync.sh"]
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 128m

  # Cloudflare Tunnel — the only route in from the public internet. Cloudflare
  # terminates TLS at its edge and forwards straight to the posapi container;
  # there is no reverse proxy in between (same pattern as the other apps on
  # this VPS). Rate limiting, security headers, and gzip are handled by the
  # API itself (see app/main.py and app/middleware/) rather than Nginx.
  # Setup: Cloudflare dashboard -> Zero Trust -> Networks -> Tunnels ->
  # Create a tunnel -> Docker -> copy the token into CLOUDFLARE_TUNNEL_TOKEN,
  # then set the Public Hostname route to http://posapi:8000.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: pos_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      posapi:
        condition: service_healthy
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  postgres_data:
  redis_data:

networks:
  pos_network:
    driver: bridge
