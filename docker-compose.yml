version: "3.9"

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: pos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-posdb}
      POSTGRES_USER: ${DATABASE_USER:-posuser}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-pospassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-posuser} -d ${DATABASE_NAME:-posdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: pos_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos_network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: pos_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DATABASE_USER:-posuser}:${DATABASE_PASSWORD:-pospassword}@postgres:5432/${DATABASE_NAME:-posdb}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pos_network

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: pos_celery_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DATABASE_USER:-posuser}:${DATABASE_PASSWORD:-pospassword}@postgres:5432/${DATABASE_NAME:-posdb}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q default
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q celery"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pos_network

  # Celery Beat
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: pos_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DATABASE_USER:-posuser}:${DATABASE_PASSWORD:-pospassword}@postgres:5432/${DATABASE_NAME:-posdb}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A app.tasks.celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping 2>/dev/null | grep -q OK || pgrep -f 'celery.*beat'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pos_network

  # Nginx
  nginx:
    image: nginx:1.25-alpine
    container_name: pos_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - pos_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  pos_network:
    driver: bridge
