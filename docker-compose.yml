version: "3.9"

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: pos_postgres
    restart: unless-stopped
    # Fix 1: raise max_connections — 4 workers×15 pool + 20 Celery + 10 admin ≈ 90, headroom to 200
    command: postgres -c max_connections=200
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 1g

  # Redis
  redis:
    image: redis:7-alpine
    container_name: pos_redis
    restart: unless-stopped
    # Fix 2: raised from 256mb to 1gb; 1300m container limit covers 1gb data + process overhead
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 1300m

  # FastAPI Application
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: pos_api
    restart: unless-stopped
    # 4 uvicorn workers OOM'd the 512m limit on this shared VPS; 2 fits comfortably
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 512m

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: pos_celery_worker
    restart: unless-stopped
    env_file: ./backend/.env
    # Concurrency 20 OOM'd the shared VPS's memory limit; 4 fits comfortably
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q default
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q celery"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 512m

  # Celery Beat
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: pos_celery_beat
    restart: unless-stopped
    env_file: ./backend/.env
    command: celery -A app.tasks.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping 2>/dev/null | grep -q OK || pgrep -f 'celery.*beat'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 128m

  # Nginx
  # Not published to the public internet — Cloudflare Tunnel (see the
  # cloudflared service below) is the only path in from outside. Bound to
  # 127.0.0.1 only, for local debugging on the VPS itself.
  nginx:
    image: nginx:1.25-alpine
    container_name: pos_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    networks:
      - pos_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128m

  # Cloudflare Tunnel — the only route in from the public internet. Cloudflare
  # terminates TLS at its edge and forwards to nginx over the tunnel, so nginx
  # itself never needs to see or handle certificates.
  # Setup: Cloudflare dashboard -> Zero Trust -> Networks -> Tunnels ->
  # Create a tunnel -> Docker -> copy the token into CLOUDFLARE_TUNNEL_TOKEN,
  # then add a Public Hostname route pointing at http://nginx:80.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: pos_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - pos_network
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  pos_network:
    driver: bridge
