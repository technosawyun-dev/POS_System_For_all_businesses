server {
    listen 80;
    server_name _;

    # Variable-based proxy_pass forces Nginx to use the http-level resolver at
    # request time instead of resolving "api" once at startup.  Without this,
    # Nginx refuses to start if the api container isn't running yet.
    set $api_backend http://api:8000;

    # Health check — no rate limit
    location /health {
        proxy_pass $api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # Auth endpoints — stricter rate limit
    location /api/v1/auth/login {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # API — standard rate limit (burst raised from 20→40 to match 120r/m zone)
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        limit_req_status 429;

        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API docs — localhost only; blocked from public internet
    location /docs {
        allow 127.0.0.1;
        deny all;
        proxy_pass $api_backend;
        proxy_set_header Host $host;
    }

    location /redoc {
        allow 127.0.0.1;
        deny all;
        proxy_pass $api_backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        allow 127.0.0.1;
        deny all;
        proxy_pass $api_backend;
        proxy_set_header Host $host;
    }
}
