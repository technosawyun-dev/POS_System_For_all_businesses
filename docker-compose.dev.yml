services:
  posapi:
    user: "0:0"
    volumes:
      - ./backend/app:/app/app
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app

  celery_worker:
    user: "0:0"
    volumes:
      - ./backend/app:/app/app
      - ./logs:/app/logs
      - ./uploads:/app/uploads
